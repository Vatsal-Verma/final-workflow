name: Story Submission → Create PR

on:
  issues:
    types: [labeled]

jobs:
  create-story-pr:
    if: github.event.label.name == 'story-submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup variables
        id: vars
        run: |
          TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH" | sed 's/^Story submission: //')
          ISSUE_NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")

          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9 ]//g' | sed 's/ \+/-/g')

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=story/${SLUG}-issue-${ISSUE_NUM}" >> "$GITHUB_OUTPUT"
          echo "issue_num=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Check for duplicate
        id: duplicate
        run: |
          if [ -d "stories/${{ steps.vars.outputs.slug }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit if duplicate
        if: steps.duplicate.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.vars.outputs.issue_num }} \
            --body "⚠️ A story with this title already exists. No PR was created."
          exit 0

      - name: Extract YAML from issue
        if: steps.duplicate.outputs.exists == 'false'
        run: |
          jq -r '.issue.body' "$GITHUB_EVENT_PATH" | \
            sed -n '/```yaml/,/```/p' | \
            sed '1d;$d' > index.yaml

          [ -s index.yaml ] || { echo "❌ No YAML block found in issue body"; exit 1; }

      - name: Create story files
        if: steps.duplicate.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STORY_DIR="stories/${{ steps.vars.outputs.slug }}"
          mkdir -p "$STORY_DIR"

          # Get issue body
          ISSUE_BODY=$(gh issue view ${{ steps.vars.outputs.issue_num }} --json body -q '.body')

          # Extract GitHub attachment URLs in order (precise UUID format)
          mapfile -t URLS < <(echo "$ISSUE_BODY" | grep -oE 'https://github\.com/user-attachments/assets/[a-f0-9-]+')

          # Validate exactly 2 images uploaded
          if [ "${#URLS[@]}" -ne 2 ]; then
            gh issue comment ${{ steps.vars.outputs.issue_num }} \
              --body "❌ Expected exactly 2 images (story image + quote image), but found ${#URLS[@]}. Please edit the issue and upload both images."
            exit 1
          fi

          # Extract image filenames from YAML using yq
          STORY_IMAGE=$(yq -r '.image' index.yaml)
          QUOTE_IMAGE=$(yq -r '.quotes[0].image' index.yaml | sed 's|^\./||')

          # Validate filenames were found
          if [ -z "$STORY_IMAGE" ] || [ -z "$QUOTE_IMAGE" ] || [ "$STORY_IMAGE" = "null" ] || [ "$QUOTE_IMAGE" = "null" ]; then
            gh issue comment ${{ steps.vars.outputs.issue_num }} \
              --body "❌ Could not extract image filenames from YAML. Make sure \`image:\` and \`quotes[0].image:\` fields are filled."
            exit 1
          fi

          # Download and validate story image
          echo "Downloading story image: $STORY_IMAGE ← ${URLS[0]}"
          if ! curl -sL -o "$STORY_DIR/$STORY_IMAGE" "${URLS[0]}" || [ ! -s "$STORY_DIR/$STORY_IMAGE" ]; then
            gh issue comment ${{ steps.vars.outputs.issue_num }} \
              --body "❌ Failed to download story image from ${URLS[0]}"
            exit 1
          fi

          # Download and validate quote image
          echo "Downloading quote image: $QUOTE_IMAGE ← ${URLS[1]}"
          if ! curl -sL -o "$STORY_DIR/$QUOTE_IMAGE" "${URLS[1]}" || [ ! -s "$STORY_DIR/$QUOTE_IMAGE" ]; then
            gh issue comment ${{ steps.vars.outputs.issue_num }} \
              --body "❌ Failed to download quote image from ${URLS[1]}"
            exit 1
          fi

          mv index.yaml "$STORY_DIR/"

      - name: Create and push branch
        if: steps.duplicate.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "${{ steps.vars.outputs.branch }}"
          git add stories/${{ steps.vars.outputs.slug }}
          git commit -m "Add story: ${{ steps.vars.outputs.slug }}"
          git push origin "${{ steps.vars.outputs.branch }}"

      - name: Create PR and comment
        if: steps.duplicate.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add story: ${{ steps.vars.outputs.slug }}" \
            --body "Auto-generated from issue #${{ steps.vars.outputs.issue_num }}" \
            --head "${{ steps.vars.outputs.branch }}" \
            --base master

          PR_URL=$(gh pr view "${{ steps.vars.outputs.branch }}" --json url -q .url)
          gh issue comment ${{ steps.vars.outputs.issue_num }} \
            --body "✅ Pull request created: $PR_URL"
