name: Story Submission → Create PR

on:
  issues:
    types: [labeled]

jobs:
  create-story-pr:
    if: github.event.label.name == 'story-submission'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Extract YAML safely from GitHub event payload
      - name: Extract YAML from issue (SAFE)
        run: |
          set -e

          jq -r '.issue.body' "$GITHUB_EVENT_PATH" > issue.md

          sed -n '/```yaml/,/```/p' issue.md \
            | sed '1d;$d' > index.yaml

          if [ ! -s index.yaml ]; then
            echo "❌ No YAML block found in issue"
            exit 1
          fi

      # 3️⃣ Generate folder slug from issue title
      - name: Generate folder slug
        id: slug
        run: |
          set -e

          TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
          TITLE="${TITLE#Story submission: }"

          SLUG=$(echo "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 ]//g' \
            | sed 's/ \+/-/g')

          if [ -z "$SLUG" ]; then
            echo "❌ Failed to generate slug"
            exit 1
          fi

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      # 4️⃣ Create story directory and move YAML
      - name: Create story directory
        run: |
          set -e
          STORY_DIR="stories/${{ steps.slug.outputs.slug }}"
          mkdir -p "$STORY_DIR"
          mv index.yaml "$STORY_DIR/index.yaml"

      # 5️⃣ Download images from issue (NO COUNT CHECK)
      - name: Download images from issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          STORY_DIR="stories/${{ steps.slug.outputs.slug }}"

          gh issue view "$ISSUE_NUMBER" --json body -q '.body' \
            | grep -oE 'https://[^ )"]+' \
            | while read -r url; do
                echo "Downloading $url"
                curl -L \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -OJ "$url" || true
              done

          shopt -s nullglob
          IMAGES=( *.png *.jpg *.jpeg *.webp )

          if [ ${#IMAGES[@]} -gt 0 ]; then
            echo "Moving ${#IMAGES[@]} image(s) into story folder"
            mv "${IMAGES[@]}" "$STORY_DIR/"
          else
            echo "No images uploaded — continuing without images"
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 6️⃣ Commit and push changes
      - name: Commit story
        run: |
          set -e

          BRANCH="story/${{ steps.slug.outputs.slug }}"
          git checkout -b "$BRANCH"

          git add stories/${{ steps.slug.outputs.slug }}
          git commit -m "Add story: ${{ steps.slug.outputs.slug }}"
          git push origin "$BRANCH"

      # 7️⃣ Open Pull Request
      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add story: ${{ steps.slug.outputs.slug }}" \
            --body "Auto-generated from issue #$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")" \
            --base main

      # 8️⃣ Comment PR link back on issue
      - name: Comment PR link on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view --json url -q .url)
          gh issue comment $(jq -r '.issue.number' "$GITHUB_EVENT_PATH") \
            --body "✅ Pull request created: $PR_URL"
