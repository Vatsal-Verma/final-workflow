name: Story Submission → Create PR

on:
  issues:
    types: [labeled]

jobs:
  create-story-pr:
    if: github.event.label.name == 'story-submission'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Extract YAML safely from issue body
      - name: Extract YAML from issue
        run: |
          set -e

          echo "${{ github.event.issue.body }}" > issue.md

          sed -n '/```yaml/,/```/p' issue.md \
            | sed '1d;$d' > index.yaml

          if [ ! -s index.yaml ]; then
            echo "❌ No YAML found in issue body"
            exit 1
          fi

      # 3️⃣ Generate folder slug from issue title
      - name: Generate folder slug
        id: slug
        run: |
          set -e

          TITLE="${{ github.event.issue.title }}"
          TITLE="${TITLE#Story submission: }"

          SLUG=$(echo "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 ]//g' \
            | sed 's/ \+/-/g')

          if [ -z "$SLUG" ]; then
            echo "❌ Failed to generate slug"
            exit 1
          fi

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      # 4️⃣ Create story directory and move YAML
      - name: Create story directory
        run: |
          set -e

          STORY_DIR="stories/${{ steps.slug.outputs.slug }}"
          mkdir -p "$STORY_DIR"
          mv index.yaml "$STORY_DIR/index.yaml"

      # 5️⃣ Download images uploaded in the issue
      - name: Download images from issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          ISSUE_NUMBER=${{ github.event.issue.number }}
          STORY_DIR="stories/${{ steps.slug.outputs.slug }}"

          gh issue view "$ISSUE_NUMBER" --json body -q '.body' \
            | grep -oE 'https://user-images.githubusercontent.com[^)]+' \
            | while read -r url; do
                echo "Downloading $url"
                curl -sSL "$url" -O
              done

          # Move downloaded images if any exist
          shopt -s nullglob
          IMAGES=( *.png *.jpg *.jpeg *.webp )

          if [ ${#IMAGES[@]} -eq 0 ]; then
            echo "❌ No images found in issue. Please upload both images."
            exit 1
          fi

          mv "${IMAGES[@]}" "$STORY_DIR/"

      # 6️⃣ Create branch, commit, push
      - name: Commit story files
        run: |
          set -e

          BRANCH="story/${{ steps.slug.outputs.slug }}"
          git checkout -b "$BRANCH"

          git add stories/${{ steps.slug.outputs.slug }}
          git commit -m "Add story: ${{ steps.slug.outputs.slug }}"
          git push origin "$BRANCH"

      # 7️⃣ Open Pull Request
      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          gh pr create \
            --title "Add story: ${{ steps.slug.outputs.slug }}" \
            --body "Auto-generated from issue #${{ github.event.issue.number }}" \
            --base main

      # 8️⃣ Comment PR link on issue
      - name: Comment PR link on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          PR_URL=$(gh pr view --json url -q .url)

          gh issue comment ${{ github.event.issue.number }} \
            --body "✅ Pull request created: $PR_URL"
