name: Story Submission → Create PR

on:
  issues:
    types: [labeled]

jobs:
  create-story-pr:
    if: github.event.label.name == 'story-submission'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup variables
        id: vars
        run: |
          # Get issue details
          TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH" | sed 's/^Story submission: //')
          ISSUE_NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          
          # Create slug from title
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9 ]//g' | sed 's/ \+/-/g')
          
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=story/${SLUG}-issue-${ISSUE_NUM}" >> "$GITHUB_OUTPUT"
          echo "issue_num=$ISSUE_NUM" >> "$GITHUB_OUTPUT"

      - name: Check for duplicate
        id: duplicate
        run: |
          if [ -d "stories/${{ steps.vars.outputs.slug }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Exit if duplicate
        if: steps.duplicate.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ steps.vars.outputs.issue_num }} \
            --body "⚠️ Story already exists. No PR created."
          exit 0

      - name: Extract YAML from issue
        if: steps.duplicate.outputs.exists == 'false'
        run: |
          # Extract issue body and get YAML block
          jq -r '.issue.body' "$GITHUB_EVENT_PATH" | 
            sed -n '/```yaml/,/```/p' | 
            sed '1d;$d' > index.yaml
          
          # Validate YAML exists
          [ -s index.yaml ] || { echo "❌ No YAML found"; exit 1; }

      - name: Create story files
        if: steps.duplicate.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STORY_DIR="stories/${{ steps.vars.outputs.slug }}"
          mkdir -p "$STORY_DIR"
          mv index.yaml "$STORY_DIR/"
          
          # Download images from issue
          gh issue view ${{ steps.vars.outputs.issue_num }} --json body -q '.body' |
            grep -oE 'https://github\.com/user-attachments/assets/[a-zA-Z0-9-]+' |
            while read -r url; do
              curl -sL -H "Authorization: Bearer $GH_TOKEN" \
                -o "$STORY_DIR/$(basename "$url").png" "$url"
            done

      - name: Create and push branch
        if: steps.duplicate.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "${{ steps.vars.outputs.branch }}"
          git add stories/${{ steps.vars.outputs.slug }}
          git commit -m "Add story: ${{ steps.vars.outputs.slug }}"
          git push origin "${{ steps.vars.outputs.branch }}"

      - name: Create PR and comment
        if: steps.duplicate.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create PR
          gh pr create \
            --title "Add story: ${{ steps.vars.outputs.slug }}" \
            --body "Auto-generated from issue #${{ steps.vars.outputs.issue_num }}" \
            --head "${{ steps.vars.outputs.branch }}" \
            --base master
          
          # Comment on issue
          PR_URL=$(gh pr view --json url -q .url)
          gh issue comment ${{ steps.vars.outputs.issue_num }} \
            --body "✅ Pull request created: $PR_URL"
