name: Story Submission → Create PR

on:
  issues:
    types: [labeled]

jobs:
  create-story-pr:
    if: github.event.label.name == 'story-submission'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # 1️⃣ Checkout main explicitly
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      # 2️⃣ Extract YAML from issue
      - name: Extract YAML from issue
        run: |
          set -e
          jq -r '.issue.body' "$GITHUB_EVENT_PATH" > issue.md
          sed -n '/```yaml/,/```/p' issue.md | sed '1d;$d' > index.yaml

          if [ ! -s index.yaml ]; then
            echo "❌ No YAML block found"
            exit 1
          fi

      # 3️⃣ Generate names
      - name: Generate names
        id: names
        run: |
          set -e
          TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          TITLE="${TITLE#Story submission: }"

          SLUG=$(echo "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 ]//g' \
            | sed 's/ \+/-/g')

          BRANCH="story/${SLUG}-issue-${ISSUE_NUMBER}"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # 4️⃣ Detect if story already exists in main
      - name: Check if story already exists
        id: exists
        run: |
          if [ -d "stories/${{ steps.names.outputs.slug }}" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      # 5️⃣ Stop early if story already exists
      - name: Comment and exit if duplicate
        if: steps.exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment \
            $(jq -r '.issue.number' "$GITHUB_EVENT_PATH") \
            --body "⚠️ A story with this title already exists in `main`. No pull request was created."
          exit 0

      # 6️⃣ Create branch ONLY when needed
      - name: Create branch
        run: |
          git checkout -b "${{ steps.names.outputs.branch }}"

      # 7️⃣ Create story directory
      - name: Create story directory
        run: |
          mkdir -p "stories/${{ steps.names.outputs.slug }}"
          mv index.yaml "stories/${{ steps.names.outputs.slug }}/index.yaml"

      # 8️⃣ Download images (optional)
      - name: Download images
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          STORY_DIR="stories/${{ steps.names.outputs.slug }}"

          gh issue view "$ISSUE_NUMBER" --json body -q '.body' \
            | grep -oE 'https://[^ )"]+' \
            | while read -r url; do
                curl -L -H "Authorization: Bearer $GH_TOKEN" -OJ "$url" || true
              done

          shopt -s nullglob
          IMAGES=( *.png *.jpg *.jpeg *.webp )
          [ ${#IMAGES[@]} -gt 0 ] && mv "${IMAGES[@]}" "$STORY_DIR/" || true

      # 9️⃣ Configure git
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 🔟 Commit & push
      - name: Commit and push
        run: |
          git add stories/${{ steps.names.outputs.slug }}
          git commit -m "Add story: ${{ steps.names.outputs.slug }}"
          git push origin "${{ steps.names.outputs.branch }}"

      # 1️⃣1️⃣ Open PR (guaranteed diff)
      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add story: ${{ steps.names.outputs.slug }}" \
            --body "Auto-generated from issue #$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")" \
            --head "${{ steps.names.outputs.branch }}" \
            --base main

      # 1️⃣2️⃣ Comment success
      - name: Comment PR link
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view --json url -q .url)
          gh issue comment \
            $(jq -r '.issue.number' "$GITHUB_EVENT_PATH") \
            --body "✅ Pull request created: $PR_URL"
