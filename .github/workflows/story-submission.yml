name: Story Submission → Create PR

on:
  issues:
    types: [labeled]

jobs:
  create-story-pr:
    if: github.event.label.name == 'story-submission'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      # 1️⃣ Checkout repository
      - uses: actions/checkout@v4

      # 2️⃣ Extract YAML safely from GitHub event payload
      - name: Extract YAML from issue
        run: |
          set -e
          jq -r '.issue.body' "$GITHUB_EVENT_PATH" > issue.md
          sed -n '/```yaml/,/```/p' issue.md | sed '1d;$d' > index.yaml

          if [ ! -s index.yaml ]; then
            echo "❌ No YAML block found in issue"
            exit 1
          fi

      # 3️⃣ Generate slug + branch name
      - name: Generate names
        id: names
        run: |
          set -e

          TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          TITLE="${TITLE#Story submission: }"

          SLUG=$(echo "$TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9 ]//g' \
            | sed 's/ \+/-/g')

          BRANCH="story/${SLUG}-issue-${ISSUE_NUMBER}"

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      # 4️⃣ Create story directory
      - name: Create story directory
        run: |
          set -e
          STORY_DIR="stories/${{ steps.names.outputs.slug }}"
          mkdir -p "$STORY_DIR"
          mv index.yaml "$STORY_DIR/index.yaml"

      # 5️⃣ Download images from issue (optional)
      - name: Download images from issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
          STORY_DIR="stories/${{ steps.names.outputs.slug }}"

          gh issue view "$ISSUE_NUMBER" --json body -q '.body' \
            | grep -oE 'https://[^ )"]+' \
            | while read -r url; do
                curl -L -H "Authorization: Bearer $GH_TOKEN" -OJ "$url" || true
              done

          shopt -s nullglob
          IMAGES=( *.png *.jpg *.jpeg *.webp )
          if [ ${#IMAGES[@]} -gt 0 ]; then
            mv "${IMAGES[@]}" "$STORY_DIR/"
          fi

      # 6️⃣ Configure git identity
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # 7️⃣ Commit and push (SAFE, UNIQUE BRANCH)
      - name: Commit story
        run: |
          set -e
          git checkout -b "${{ steps.names.outputs.branch }}"
          git add stories/${{ steps.names.outputs.slug }}
          git commit -m "Add story: ${{ steps.names.outputs.slug }}"
          git push origin "${{ steps.names.outputs.branch }}"

      # 8️⃣ Open Pull Request
      - name: Open Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Add story: ${{ steps.names.outputs.slug }}" \
            --body "Auto-generated from issue #$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")" \
            --head "${{ steps.names.outputs.branch }}" \
            --base main

      # 9️⃣ Comment PR link on issue
      - name: Comment PR link on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr view --json url -q .url)
          gh issue comment $(jq -r '.issue.number' "$GITHUB_EVENT_PATH") \
            --body "✅ Pull request created: $PR_URL"
